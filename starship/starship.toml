"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

format = """
$os\
[Ņé░](bg:peach fg:red)\
$directory\
[Ņé░](bg:green fg:peach)\
$git_branch\
${custom.git_clean_prompt_arrow}\
${custom.git_dirty_prompt_sep}\
$git_status\
${custom.git_dirty_prompt_arrow}\
$line_break """
# [Ņé░](fg:green bg:lavender)\
# [Ņé░ ](fg:lavender)\

# Ņé▓ Ņś¦ v1.26.1 Ņé▓Ņé▓Ņé▓ ’É║ 18:50
right_format = """
$status\
[Ņé▓](fg:sky)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé▓](fg:mauve bg:sky)\
$cmd_duration\
[Ņé▓](fg:lavender bg:mauve)\
$time"""
# [Ņé▓](fg:blue bg:sapphire)\
# $conda\


palette = "catppuccin_frappe"

[os]
disabled = false
format   = "[ $symbol]($style)"
style    = "bg:red fg:crust"

[os.symbols]
Alpine           = "’īĆ"
Amazon           = "’ē░"
Android          = "Ņ£Ä"
Arch             = "¾░Żć"
Artix            = "¾░Żć"
CentOS           = "’īä"
Debian           = "¾░ŻÜ"
Fedora           = "¾░Żø"
Gentoo           = "¾░Ż©"
Linux            = "¾░īĮ"
Macos            = "¾░ĆĄ"
Manjaro          = "’īÆ"
Mint             = "¾░ŻŁ"
Raspbian         = "¾░É┐"
RedHatEnterprise = "¾▒äø"
Redhat           = "¾▒äø"
SUSE             = "’īö"
Ubuntu           = "¾░Ģł"
Windows          = "Ņ£Å"

[username]
format      = "[ $user]($style)"
show_always = true
style_root  = "bg:red fg:crust"
style_user  = "bg:red fg:crust"

[directory]
format            = "[ $path ]($style)"
style             = "bg:peach fg:crust"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Developer" = "¾░▓ŗ "
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music"     = "¾░ØÜ "
"Pictures"  = "’ĆŠ "

[custom.git_clean_prompt_arrow]
command        = ""
format         = "[Ņé░](fg:green)"
ignore_timeout = true
shell          = "zsh"
when           = "! git status --porcelain 2>/dev/null | grep -q ."

[custom.git_dirty_prompt_arrow]
command        = ""
format         = "[Ņé░](fg:yellow)"
ignore_timeout = true
require_repo   = true
shell          = "zsh"
when           = "git status --porcelain 2>/dev/null | grep -q ."

[custom.git_dirty_prompt_sep]
command        = ""
format         = "[Ņé░](fg:green bg:yellow)"
ignore_timeout = true
require_repo   = true
shell          = "zsh"
style          = "(fg:yellow)"
when           = "git status --porcelain 2>/dev/null | grep -q ."


[git_branch]
format = "[[ $symbol $branch ](fg:crust bg:green)]($style)"
style  = "bg:green"
symbol = "’Éś"

[git_status]
deleted   = "Ō£ś$count"
modified  = "!$count"
renamed   = "┬╗$count"
staged    = "+$count"
stashed   = "*$count"
untracked = "?$count"

ahead    = "ŌćĪ$count"
behind   = "ŌćŻ$count"
diverged = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}"

format = "[[($all_status$ahead_behind)](fg:crust bg:yellow)]($style)"
style  = "bg:green"

[nodejs]
format = "[[ $symbol( $version) ](fg:crust bg:sky)]($style)"
style  = "bg:sky"
symbol = "Ņ£ś"

[c]
format = "[[ $symbol( $version) ](fg:crust bg:sky)]($style)"
style  = "bg:sky"
symbol = "Ņś× "

[rust]
format = "[[ $symbol( $version) ](fg:crust bg:sky)]($style)"
style  = "bg:sky"
symbol = "Ņ×©"

[golang]
format = "[[ $symbol( $version) ](fg:crust bg:sky)]($style)"
style  = "bg:sky"
symbol = "Ņś¦"

[php]
format = "[[ $symbol( $version) ](fg:crust bg:sky)]($style)"
style  = "bg:sky"
symbol = "Ņśł"

[java]
format = "[[ $symbol( $version) ](fg:crust bg:sky)]($style)"
style  = "bg:sky"
symbol = "Ņē¢ "

[kotlin]
format = "[[ $symbol( $version) ](fg:crust bg:sky)]($style)"
style  = "bg:sky"
symbol = "Ņś┤"

[haskell]
format = "[[ $symbol( $version) ](fg:crust bg:sky)]($style)"
style  = "bg:sky"
symbol = "Ņś¤"

[python]
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:sky)]($style)'
style  = "bg:sky"
symbol = "Ņśå"

[docker_context]
format = "[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)"
style  = "bg:sapphire"
symbol = "’īł"

[conda]
format      = "[$symbol$environment ]($style)"
ignore_base = false
style       = "fg:crust bg:sapphire"
symbol      = " ’äī "

[time]
disabled    = false
format      = "[[ ’É║ $time ](fg:crust bg:lavender)]($style)"
style       = "bg:lavender"
time_format = "%T"

[line_break]
disabled = true

[status]
disabled       = false
format         = "[Ņé▓](fg:red)[ $status $signal_name]($style) "
style          = "fg:crust bg:red"
success_symbol = ""
symbol         = ""

[character]
disabled = true
# success_symbol = "[ŌØ»](bold fg:green)"
# error_symbol = "[ŌØ»](bold fg:red)"
# vimcmd_symbol = "[ŌØ«](bold fg:green)"
# vimcmd_replace_one_symbol = "[ŌØ«](bold fg:lavender)"
# vimcmd_replace_symbol = "[ŌØ«](bold fg:lavender)"
# vimcmd_visual_symbol = "[ŌØ«](bold fg:yellow)"

[cmd_duration]
format            = "[ $duration ]($style)"
show_milliseconds = true
style             = "fg:crust bg:mauve"
# style = "bg:lavender"
disabled           = false
min_time_to_notify = 45000
show_notifications = true

